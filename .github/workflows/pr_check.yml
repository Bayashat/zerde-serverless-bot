name: PR Check

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  id-token: write # OIDC authentication required
  contents: read
  pull-requests: write # Allow bot to write diff results to PR comments

jobs:
  quality-check:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history for better diff preview

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install project dependencies with uv
        run: |
          uv sync --frozen

      - name: Run pre-commit hooks
        run: |
          uv run pre-commit run --all-files

      - name: Run Unit Tests
        run: |
          uv run pytest tests/ -v

  infra-preview:
    needs: quality-check
    name: Infrastructure Changes Preview
    runs-on: ubuntu-24.04-arm
    if: github.event.pull_request.head.repo.full_name == github.repository

    # API keys and tokens are stored in SSM Parameter Store — CDK only needs non-secret config.
    env:
      DEFAULT_LANG: ${{ vars.DEFAULT_LANG || 'kk' }}
      TELEGRAM_API_BASE: ${{ vars.TELEGRAM_API_BASE || 'https://api.telegram.org/bot' }}
      AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3-flash-preview' }}
      WTF_GEMINI_MODEL: ${{ vars.WTF_GEMINI_MODEL || 'gemini-3.1-flash-lite-preview' }}
      GEMINI_RPD_LIMIT: ${{ vars.GEMINI_RPD_LIMIT || '500' }}
      GEMINI_API_BASE: ${{ vars.GEMINI_API_BASE || 'https://generativelanguage.googleapis.com/v1beta/models' }}
      FALLBACK_MODEL: ${{ vars.FALLBACK_MODEL || 'gemini-2.5-flash' }}
      GROQ_MODEL: ${{ vars.GROQ_MODEL || 'llama-3.3-70b-versatile' }}
      GROQ_API_BASE: ${{ vars.GROQ_API_BASE || 'https://api.groq.com/openai/v1' }}
      DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL || 'deepseek-chat' }}
      DEEPSEEK_API_BASE: ${{ vars.DEEPSEEK_API_BASE || 'https://api.deepseek.com' }}
      ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
      CHATS_KK: ${{ vars.CHATS_KK }}
      CHATS_ZH: ${{ vars.CHATS_ZH }}
      CHATS_RU: ${{ vars.CHATS_RU }}
      CAPTCHA_TIMEOUT_SECONDS: ${{ vars.CAPTCHA_TIMEOUT_SECONDS || '120' }}
      KICK_BAN_DURATION_SECONDS: ${{ vars.KICK_BAN_DURATION_SECONDS || '31' }}
      VOTEBAN_THRESHOLD: ${{ vars.VOTEBAN_THRESHOLD || '7' }}
      VOTEBAN_FORGIVE_THRESHOLD: ${{ vars.VOTEBAN_FORGIVE_THRESHOLD || '7' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install AWS CDK CLI
        run: |
          npm install -g aws-cdk

      - name: Install project dependencies with uv
        run: |
          uv sync --frozen --no-dev

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      - name: CDK Synth (Verify Compilation)
        working-directory: ./infra
        run: |
          uv run cdk synth -c env=dev

      - name: CDK Diff (Preview Changes)
        id: cdk-diff
        working-directory: ./infra
        run: |
          uv run cdk diff -c env=dev > /tmp/cdk-diff.txt 2>&1 || true

          echo "## 📊 Infrastructure Changes Preview (Zerde Telegram Bot)" > /tmp/diff-report.md
          echo "" >> /tmp/diff-report.md
          echo "This PR will modify the following AWS resources:" >> /tmp/diff-report.md
          echo "" >> /tmp/diff-report.md

          if ! grep -q "Stack ZerdeTelegramBotStack-dev" /tmp/cdk-diff.txt && ! grep -q "There were no differences" /tmp/cdk-diff.txt; then
            echo "### ℹ️ No infrastructure changes detected" >> /tmp/diff-report.md
            echo "" >> /tmp/diff-report.md
            echo "This PR only contains code changes (Lambda functions, etc.)" >> /tmp/diff-report.md
            echo "" >> /tmp/diff-report.md
          else
            echo "### ✅ Resources to be Created:" >> /tmp/diff-report.md
            echo "" >> /tmp/diff-report.md
            grep -E "^\s*\+.*AWS::" /tmp/cdk-diff.txt | sed 's/^[[:space:]]*+/  - /' | sed 's/AWS::/`AWS::/' | sed 's/$/`/' | head -20 >> /tmp/diff-report.md || echo "  - None" >> /tmp/diff-report.md
            echo "" >> /tmp/diff-report.md

            echo "### ❌ Resources to be Deleted:" >> /tmp/diff-report.md
            echo "" >> /tmp/diff-report.md
            grep -E "^\s*\-.*AWS::" /tmp/cdk-diff.txt | sed 's/^[[:space:]]*-/  - /' | sed 's/AWS::/`AWS::/' | sed 's/$/`/' | head -20 >> /tmp/diff-report.md || echo "  - None" >> /tmp/diff-report.md
            echo "" >> /tmp/diff-report.md

            echo "### ⚠️ Resources to be Modified:" >> /tmp/diff-report.md
            echo "" >> /tmp/diff-report.md
            grep -E "^\s*~.*AWS::" /tmp/cdk-diff.txt | sed 's/^[[:space:]]*~/  - /' | sed 's/AWS::/`AWS::/' | sed 's/$/`/' | head -20 >> /tmp/diff-report.md || echo "  - None" >> /tmp/diff-report.md
            echo "" >> /tmp/diff-report.md

            echo "### 🔧 Property Changes:" >> /tmp/diff-report.md
            echo "" >> /tmp/diff-report.md
            grep -E "^\s*[+\-~].*:" /tmp/cdk-diff.txt | grep -v "AWS::" | head -30 >> /tmp/diff-report.md || echo "  - None" >> /tmp/diff-report.md
            echo "" >> /tmp/diff-report.md
          fi

          echo "<details>" >> /tmp/diff-report.md
          echo "<summary>📋 Full CDK Diff Output</summary>" >> /tmp/diff-report.md
          echo "" >> /tmp/diff-report.md
          echo '```diff' >> /tmp/diff-report.md
          cat /tmp/cdk-diff.txt >> /tmp/diff-report.md
          echo '```' >> /tmp/diff-report.md
          echo "</details>" >> /tmp/diff-report.md

          cat /tmp/diff-report.md

      - name: Comment PR with Infrastructure Diff
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/diff-report.md', 'utf8');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Infrastructure Changes Preview')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: report
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: report
              });
            }
