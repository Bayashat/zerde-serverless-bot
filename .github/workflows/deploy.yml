name: Deploy to AWS

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      environment:
        description: "Target Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - prod

permissions:
  id-token: write # OIDC authentication required
  contents: read

jobs:
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-24.04-arm
    # Manual prod deploys require a GitHub Environment (e.g. "production") with approvers; dev is ungated.
    environment: ${{ (github.event_name == 'workflow_dispatch' && inputs.environment == 'prod') && 'production' || 'development' }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine Target Environment
        id: determine-env
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "TARGET_ENV=${{ inputs.environment }}" >> $GITHUB_ENV
            echo "Selected manual deployment to: ${{ inputs.environment }}"
          else
            echo "TARGET_ENV=dev" >> $GITHUB_ENV
            echo "Push event detected. Defaulting deployment to: dev"
          fi

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      # CDK CLI must match aws-cdk-lib in uv.lock (cloud assembly schema). Bump when upgrading aws-cdk-lib.
      - name: Install AWS CDK CLI (pinned to lib)
        run: |
          npm install -g aws-cdk@2.248.0
          uv run cdk --version

      - name: Install project dependencies with uv
        run: |
          uv sync --frozen --no-dev

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1

      # API keys and tokens are stored in SSM Parameter Store — CDK only needs non-secret config.
      - name: CDK Deploy
        working-directory: ./infra
        env:
          DEFAULT_LANG: ${{ vars.DEFAULT_LANG || 'kk' }}
          TELEGRAM_API_BASE: ${{ vars.TELEGRAM_API_BASE || 'https://api.telegram.org/bot' }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER || 'gemini' }}
          NEWS_GEMINI_MODEL: ${{ vars.NEWS_GEMINI_MODEL }}
          QUIZ_GEMINI_MODEL: ${{ vars.QUIZ_GEMINI_MODEL }}
          WTF_GEMINI_MODEL: ${{ vars.WTF_GEMINI_MODEL }}
          GEMINI_RPD_LIMIT: ${{ vars.GEMINI_RPD_LIMIT }}
          GEMINI_API_BASE: ${{ vars.GEMINI_API_BASE || 'https://generativelanguage.googleapis.com/v1beta/models' }}
          FALLBACK_MODEL: ${{ vars.FALLBACK_MODEL }}
          GROQ_MODEL: ${{ vars.GROQ_MODEL }}
          GROQ_API_BASE: ${{ vars.GROQ_API_BASE || 'https://api.groq.com/openai/v1' }}
          DEEPSEEK_MODEL: ${{ vars.DEEPSEEK_MODEL }}
          DEEPSEEK_API_BASE: ${{ vars.DEEPSEEK_API_BASE || 'https://api.deepseek.com' }}
          ADMIN_USER_ID: ${{ secrets.ADMIN_USER_ID }}
          CHATS_KK: ${{ vars.CHATS_KK }}
          CHATS_ZH: ${{ vars.CHATS_ZH }}
          CHATS_RU: ${{ vars.CHATS_RU }}
          NEWS_CHATS_KK: ${{ vars.NEWS_CHATS_KK }}
          NEWS_CHATS_ZH: ${{ vars.NEWS_CHATS_ZH }}
          NEWS_CHATS_RU: ${{ vars.NEWS_CHATS_RU }}
          QUIZ_CHATS_KK: ${{ vars.QUIZ_CHATS_KK }}
          QUIZ_CHATS_ZH: ${{ vars.QUIZ_CHATS_ZH }}
          QUIZ_CHATS_RU: ${{ vars.QUIZ_CHATS_RU }}
          CAPTCHA_TIMEOUT_SECONDS: ${{ vars.CAPTCHA_TIMEOUT_SECONDS || '120' }}
          KICK_BAN_DURATION_SECONDS: ${{ vars.KICK_BAN_DURATION_SECONDS || '31' }}
          VOTEBAN_THRESHOLD: ${{ vars.VOTEBAN_THRESHOLD || '7' }}
          VOTEBAN_FORGIVE_THRESHOLD: ${{ vars.VOTEBAN_FORGIVE_THRESHOLD || '7' }}
          CAPTCHA_MAX_ATTEMPTS: ${{ vars.CAPTCHA_MAX_ATTEMPTS || '3' }}
          QUIZ_LLM_RPD: ${{ vars.QUIZ_LLM_RPD }}
        run: |
          echo "🚀 Deploying to ${{ env.TARGET_ENV }} environment..."
          if [ "${{ env.TARGET_ENV }}" = "prod" ]; then
            # Human approval is enforced by the GitHub "production" Environment.
            # Keep CDK non-interactive so the runner never waits for stdin.
            uv run cdk deploy -c env=prod --require-approval never --all
          else
            uv run cdk deploy -c env=dev --require-approval never --all
          fi

      - name: Get Deployment Outputs
        if: success()
        working-directory: ./infra
        run: |
          echo "## 🚀 Deployment Successful (Zerde Telegram Bot)" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to: **${{ env.TARGET_ENV }}**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Stack Outputs:" >> $GITHUB_STEP_SUMMARY

          STACK_NAME="zerde-serverless-telegram-bot-${{ env.TARGET_ENV }}"

          aws cloudformation describe-stacks \
            --stack-name $STACK_NAME \
            --region eu-central-1 \
            --query 'Stacks[0].Outputs[*].[OutputKey,OutputValue]' \
            --output table >> $GITHUB_STEP_SUMMARY || echo "Could not fetch outputs" >> $GITHUB_STEP_SUMMARY
